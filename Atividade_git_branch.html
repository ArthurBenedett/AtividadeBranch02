<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Dashboard - Ciência de Dados</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
    url("Brasao_do_Sao_Paulo_Futebol_Clube.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;

    color:#fff;
}

/* CONTAINER */

.dashboard-container{
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.2);
    border-radius:16px;

    padding:40px;
    max-width:520px;
    width:100%;

    box-shadow:0 10px 35px rgba(0,0,0,0.4);

    text-align:center;
}

/* TITULO */

h1{
    font-size:28px;
    margin-bottom:30px;

    background:linear-gradient(90deg,#ff2c2c,#ffffff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* GRID */

.metrics-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

/* CARDS */

.card{
    background:rgba(255,255,255,0.12);
    padding:20px;
    border-radius:12px;

    transition:0.25s;

    border:1px solid rgba(255,255,255,0.15);
}

.card:hover{
    transform:translateY(-5px) scale(1.03);
    background:rgba(255,255,255,0.2);
}

/* VALOR */

.card-value{
    font-size:28px;
    font-weight:700;
    display:block;
    margin-bottom:5px;
}

/* LABEL */

.card-label{
    font-size:14px;
    opacity:0.8;
}

/* STATUS */

.server-status{
    margin-top:30px;
    font-size:13px;
    opacity:0.9;
}

.online{
    color:#00ff88;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="dashboard-container">

<h1>📊 Dashboard Analítico</h1>

<div class="metrics-grid">

<div class="card">
<span class="card-value">94.2%</span>
<span class="card-label">Acurácia</span>
</div>

<div class="card">
<span class="card-value">1.2s</span>
<span class="card-label">Latência</span>
</div>

</div>

<p class="server-status">
Status do Servidor: <span class="online">● Online</span>
</p>

</div>

</body>
</html>
